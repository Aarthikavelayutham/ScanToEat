<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}ScanToEat{% endblock %}</title>
    {% load static %}
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
</head>
<body>

    <header class="header">
        <div class="header-inner">
            <h1 class="logo">ScanToEat</h1>
            {% if request.session.table_number %}
                <span class="table-badge">Table {{ request.session.table_number }}</span>
            {% endif %}
            <a href="{% url 'cart' %}" class="cart-btn">
                Cart
                {% if request.session.cart %}
                    <span class="cart-count">
                        {{ request.session.cart_total_qty|default:0 }}
                    </span>
                {% endif %}
            </a>
        </div>
    </header>

    <main class="main">
        {% block content %}
        {% endblock %}
    </main>

<script>
function addToCart(itemId, btn) {
    fetch("{% url 'add_to_cart' %}", {
        method: 'POST',
        headers: {
            'Content-Type': 'application/x-www-form-urlencoded',
            'X-CSRFToken': '{{ csrf_token }}',
        },
        body: 'item_id=' + itemId,
    })
    .then(res => res.json())
    .then(data => {
        if (data.success) {
            btn.textContent = 'Added!';
            btn.style.background = '#2e7d32';
            setTimeout(() => {
                btn.textContent = 'Add';
                btn.style.background = '#ff6b35';
            }, 1000);
            const countEl = document.querySelector('.cart-count');
            if (countEl) {
                countEl.textContent = data.total_items;
            } else {
                const cartBtn = document.querySelector('.cart-btn');
                const span = document.createElement('span');
                span.className = 'cart-count';
                span.textContent = data.total_items;
                cartBtn.appendChild(span);
            }
        }
    })
    .catch(err => {
        btn.textContent = 'Error';
        btn.style.background = '#c62828';
        setTimeout(() => {
            btn.textContent = 'Add';
            btn.style.background = '#ff6b35';
        }, 1500);
    });
}
</script>

</body>
</html>
