<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kitchen Dashboard — ScanToEat</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: #1a1a2e; color: #eee; }

        .header {
            background: #16213e;
            padding: 16px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #ff6b35;
        }

        .header h1 { color: #ff6b35; font-size: 22px; }

        .live-badge {
            background: #2ecc71;
            color: white;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 700;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.6; }
        }

        .dashboard {
            padding: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .orders-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 16px;
        }

        .order-card {
            background: #16213e;
            border-radius: 12px;
            padding: 16px;
            border-left: 4px solid #ff6b35;
        }

        .order-card.preparing {
            border-left-color: #f39c12;
        }

        .order-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .order-table {
            font-size: 18px;
            font-weight: 700;
            color: #ff6b35;
        }

        .order-time {
            font-size: 12px;
            color: #888;
        }

        .status-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            margin-bottom: 12px;
        }

        .status-pending { background: #e74c3c; color: white; }
        .status-preparing { background: #f39c12; color: white; }

        .order-items {
            list-style: none;
            margin-bottom: 16px;
        }

        .order-items li {
            padding: 6px 0;
            border-bottom: 1px solid #0f3460;
            font-size: 14px;
            display: flex;
            justify-content: space-between;
        }

        .order-items li:last-child { border-bottom: none; }

        .item-qty {
            background: #ff6b35;
            color: white;
            padding: 2px 8px;
            border-radius: 10px;
            font-size: 12px;
            font-weight: 700;
        }

        .action-btns {
            display: flex;
            gap: 8px;
        }

        .btn {
            flex: 1;
            padding: 8px;
            border: none;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
        }

        .btn-prepare { background: #f39c12; color: white; }
        .btn-ready { background: #2ecc71; color: white; }
        .btn-prepare:hover { background: #d68910; }
        .btn-ready:hover { background: #27ae60; }

        .no-orders {
            text-align: center;
            padding: 60px;
            color: #555;
            font-size: 18px;
        }
    </style>
</head>
<body>

<div class="header">
    <h1>Kitchen Dashboard</h1>
    <span class="live-badge">LIVE</span>
</div>

<div class="dashboard">
    <div id="orders-container">
        {% include 'kitchen/orders_fragment.html' %}
    </div>
</div>

{% load static %}
<script src="{% static 'js/utils.js' %}"></script>
<script>
function updateStatus(orderId, status) {
    fetch(`/kitchen/update/${orderId}/`, {
        method: 'POST',
        headers: {
            'Content-Type': 'application/x-www-form-urlencoded',
            'X-CSRFToken': getCookie('csrftoken'),
        },
        body: 'status=' + status,
    })
    .then(res => res.json())
    .then(data => {
        if (data.success) {
            refreshOrders();
        } else {
            alert(data.error || 'Failed to update status');
        }
    })
    .catch(err => {
        console.error('Status update failed:', err);
        alert('Network error — please try again');
    });
}

function refreshOrders() {
    fetch('/kitchen/fragment/')
        .then(res => res.text())
        .then(html => {
            document.getElementById('orders-container').innerHTML = html;
        })
        .catch(err => {
            console.error('Refresh failed:', err);
        });
}

// Auto refresh every 5 seconds
setInterval(refreshOrders, 5000);
</script>

</body>
</html>
