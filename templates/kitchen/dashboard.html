<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kitchen Dashboard — ScanToEat</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: #1a1a2e; color: #eee; }

        .header {
            background: #16213e;
            padding: 16px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #ff6b35;
        }

        .home-btn {
            background: rgba(255,255,255,0.1);
            color: #ff6b35;
            text-decoration: none;
            padding: 6px 14px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: all 0.2s;
            border: 1px solid rgba(255,107,53,0.3);
        }

        .home-btn:hover {
            background: #ff6b35;
            color: white;
            border-color: #ff6b35;
        }

        .header h1 { color: #ff6b35; font-size: 22px; margin-left: 16px; flex: 1; }

        .live-badge {
            background: #2ecc71;
            color: white;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 700;
            animation: pulse 2s infinite;
        }


        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.6; }
        }

        .dashboard {
            padding: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .orders-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 16px;
        }

        .order-card {
            background: #16213e;
            border-radius: 12px;
            padding: 16px;
            border-left: 4px solid #ff6b35;
        }

        .order-card.preparing {
            border-left-color: #f39c12;
        }

        .order-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .order-table {
            font-size: 18px;
            font-weight: 700;
            color: #ff6b35;
        }

        .order-time {
            font-size: 12px;
            color: #888;
        }

        .status-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            margin-bottom: 12px;
        }

        .status-pending { background: #e74c3c; color: white; }
        .status-preparing { background: #f39c12; color: white; }

        .order-items {
            list-style: none;
            margin-bottom: 16px;
        }

        .order-items li {
            padding: 6px 0;
            border-bottom: 1px solid #0f3460;
            font-size: 14px;
            display: flex;
            justify-content: space-between;
        }

        .order-items li:last-child { border-bottom: none; }

        .item-qty {
            background: #ff6b35;
            color: white;
            padding: 2px 8px;
            border-radius: 10px;
            font-size: 12px;
            font-weight: 700;
        }

        .action-btns {
            display: flex;
            gap: 8px;
        }

        .btn {
            flex: 1;
            padding: 8px;
            border: none;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
        }

        .btn-prepare { background: #f39c12; color: white; }
        .btn-ready { background: #2ecc71; color: white; }
        .btn-prepare:hover { background: #d68910; }
        .btn-ready:hover { background: #27ae60; }

        .no-orders {
            text-align: center;
            padding: 60px;
            color: #555;
            font-size: 18px;
        }

        /* Notification Alert */
        .new-order-alert {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: #ff6b35;
            color: white;
            padding: 12px 24px;
            border-radius: 30px;
            font-weight: 700;
            box-shadow: 0 4px 15px rgba(255,107,53,0.4);
            z-index: 2000;
            display: none;
            animation: slideDown 0.5s ease;
        }

        @keyframes slideDown {
            from { top: -60px; opacity: 0; }
            to { top: 20px; opacity: 1; }
        }
    </style>
</head>
<body>

<div class="header">
    <a href="/" class="home-btn">🏠 Home</a>
    <h1>Kitchen Dashboard</h1>
    <span class="live-badge">LIVE</span>
</div>


<div class="dashboard">
    <div id="new-order-banner" class="new-order-alert">🔔 NEW ORDER RECEIVED!</div>
    <div id="orders-container">
        {% include 'kitchen/orders_fragment.html' %}
    </div>
</div>

<!-- Sound notification -->
<audio id="notification-sound" preload="auto">
    <source src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3" type="audio/mpeg">
</audio>

{% load static %}
<script src="{% static 'js/utils.js' %}"></script>
<script>
function updateStatus(orderId, status) {
    fetch(`/kitchen/update/${orderId}/`, {
        method: 'POST',
        headers: {
            'Content-Type': 'application/x-www-form-urlencoded',
            'X-CSRFToken': getCookie('csrftoken'),
        },
        body: 'status=' + status,
    })
    .then(res => res.json())
    .then(data => {
        if (data.success) {
            refreshOrders();
        } else {
            alert(data.error || 'Failed to update status');
        }
    })
    .catch(err => {
        console.error('Status update failed:', err);
        alert('Network error — please try again');
    });
}

// Auto refresh every 5 seconds
let lastOrderCount = {{ orders|length|default:0 }};

function refreshOrders() {
    fetch('/kitchen/fragment/')
        .then(res => res.text())
        .then(html => {
            const tempDiv = document.createElement('div');
            tempDiv.innerHTML = html;
            
            // Count current 'pending' orders in the new HTML
            const currentPendingCount = tempDiv.querySelectorAll('.order-card.pending').length;
            
            // If more pending orders than before, notify!
            if (currentPendingCount > lastOrderCount) {
                notifyNewOrder();
            }
            
            lastOrderCount = currentPendingCount;
            document.getElementById('orders-container').innerHTML = html;
        })
        .catch(err => {
            console.error('Refresh failed:', err);
        });
}

function notifyNewOrder() {
    const sound = document.getElementById('notification-sound');
    const banner = document.getElementById('new-order-banner');
    
    // Play sound
    if (sound) {
        sound.currentTime = 0;
        sound.play().catch(e => console.log("Sound play blocked by browser. Kitchen needs to click once on page to enable."));
    }
    
    // Show banner
    if (banner) {
        banner.style.display = 'block';
        setTimeout(() => {
            banner.style.display = 'none';
        }, 3000);
    }
}

setInterval(refreshOrders, 5000);

// User interaction required for sound in most browsers
document.body.addEventListener('click', function() {
    console.log("Audio context enabled");
}, { once: true });
</script>

</body>
</html>
